model:
  pretrained_checkpoint: /workspace/exp_outputs/checkpoints/dynamicrafter_512_v1/model.ckpt
  base_learning_rate: 1.0e-05
  scale_lr: False
  target: lvdm.models.ddpm3d_maskcat.LatentVisualDiffusion
  params:
    ignore_keys: ["model.diffusion_model.input_blocks.0.0.weight"]
    rescale_betas_zero_snr: True
    parameterization: "v"
    linear_start: 0.00085
    linear_end: 0.012
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: video
    first_stage_extra_key: mask
    cond_stage_key: caption
    cond_stage_trainable: False
    image_proj_model_trainable: True
    conditioning_key: hybrid
    image_size: [40, 64]
    channels: 4
    scale_by_std: False
    scale_factor: 0.18215
    use_ema: False
    uncond_prob: 0.00
    uncond_type: 'empty_seq'
    rand_cond_frame: false
    use_dynamic_rescale: true
    base_scale: 0.7
    fps_condition_type: 'fps'
    perframe_ae: True
    freeze_temporal: True
    val_kwargs: &default_kwargs
      ddim_steps: 50
      unconditional_guidance_scale: 1.0
      timestep_spacing: uniform_trailing
      guidance_rescale: 0.7
      sampled_img_num: null

    unet_config:
      target: lvdm.modules.networks.openaimodel3d.UNetModel
      params:
        in_channels: 12
        out_channels: 4
        model_channels: 320
        attention_resolutions:
        - 4
        - 2
        - 1
        num_res_blocks: 2
        channel_mult:
        - 1
        - 2
        - 4
        - 4
        dropout: 0.1
        num_head_channels: 64
        transformer_depth: 1
        context_dim: 1024
        use_linear: true
        use_checkpoint: True
        temporal_conv: True
        temporal_attention: True
        temporal_selfatt_only: true
        use_relative_position: false
        use_causal_attention: False
        temporal_length: 16
        addition_attention: true
        image_cross_attention: true
        default_fs: 10
        fs_condition: true
        extra_mask_attn: True

    first_stage_config:
      target: lvdm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        monitor: val/rec_loss
        ddconfig:
          double_z: True
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity

    cond_stage_config:
      target: lvdm.modules.encoders.condition.FrozenOpenCLIPEmbedder
      params:
        freeze: true
        layer: "penultimate"

    img_cond_stage_config:
      target: lvdm.modules.encoders.condition.FrozenOpenCLIPImageEmbedderV2
      params:
        freeze: true

    obj_cond_stage_config:
      # target: lvdm.modules.encoders.condition.FrozenOpenCLIPImageEmbedderV2
      target: lvdm.modules.encoders.condition.FrozenDINOv2Embedder
      params:
        freeze: true
    
    image_proj_stage_config:
      target: lvdm.modules.encoders.resampler.Resampler
      params:
        dim: 1024
        depth: 4
        dim_head: 64
        heads: 12
        num_queries: 16
        embedding_dim: 1280
        output_dim: 1024
        ff_mult: 4
        video_length: 16

    object_proj_stage_config:
      target: lvdm.modules.encoders.resampler.FFN
      params:
        dim: 1024
        mult: 4

data:
  target: utils_data.DataModuleFromConfig
  params:
    batch_size: 8 # one gpu, A100 80G
    val_batch_size: 1
    num_workers: null
    wrap: false
    train:
      target: lvdm.data.hoi4d.HOI4D
      params:
        data_dir: /train_data/HOI4D
        # meta_path: /train_data/HOI4D/HOI4D-Instructions/train_hoi4d_train.csv
        meta_path: /train_data/HOI4D/train_hoi4d.csv
        video_length: 16
        frame_stride: 1
        load_raw_resolution: true
        resolution: [320, 512]
        spatial_transform: resize_random_crop
        random_fs: false  ## if true, we uniformly sample fs with max_fs=frame_stride (above)
        random_dilation_erosion: true
        dilation_erosion_rate: 0.2
    
    validation:
      target: lvdm.data.hoi4d.HOI4D
      params:
        data_dir: /train_data/HOI4D
        # meta_path: /train_data/HOI4D/HOI4D-Instructions/train_hoi4d_test.csv
        meta_path: /train_data/HOI4D/test_hoi4d.csv
        video_length: 16
        frame_stride: 1
        load_raw_resolution: true
        resolution: [320, 512]
        spatial_transform: resize_center_crop
        random_fs: false  ## if true, we uniformly sample fs with max_fs=frame_stride (above)

lightning:
  precision: 16
  # strategy: deepspeed_stage_2
  trainer:
    benchmark: True
    accumulate_grad_batches: 2
    max_steps: 100000
    # logger
    log_every_n_steps: 50
    # val
    # val_check_interval: 0.5
    check_val_every_n_epoch: 2
    gradient_clip_algorithm: 'norm'
    gradient_clip_val: 0.5
  callbacks:
    model_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        monitor: fvd
        mode: min
        save_top_k: 3
        filename: "{epoch}-{step}-{fvd:.4f}-{fid:.4f}-{lpips:.4f}-{ssim:.4f}-{psnr:.4f}-{viclip-v:.4f}-{viclip-t:.4f}-{gen_fc:.4f}"
        save_weights_only: True
        save_on_train_epoch_end: False
    # metrics_over_trainsteps_checkpoint:
    #   target: pytorch_lightning.callbacks.ModelCheckpoint
    #   params:
    #     filename: '{epoch}-{step}'
    #     save_weights_only: True
    #     every_n_train_steps: 1500 #20000 # 3s/step*2w=
    batch_logger:
      target: callbacks.ImageLogger
      params:
        batch_frequency: 100000
        max_images: 8
        log_images_kwargs:
          <<: *default_kwargs
          sampled_img_num: 3